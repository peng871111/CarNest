<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 760" width="420" height="760" role="img" aria-labelledby="title desc">
  <title id="title">CarNest Auction Style Body Damage Map</title>
  <desc id="desc">Top-down auction-style vehicle body map with front windscreen, rear glass, panels and wheels.</desc>
  <defs>
    <style>
      .outline{fill:none;stroke:#8f846f;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke}
      .panel{fill:rgba(255,255,255,0.01);stroke:#8f846f;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke}
      .glass{fill:none;stroke:#8f846f;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke}
      .thin{fill:none;stroke:#8f846f;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke}
      .hit{fill:transparent;stroke:transparent;stroke-width:0;pointer-events:all}
    </style>
  </defs>

  <!-- Reference-style outer guide lines -->
  <g id="vehicle-outline" class="outline">
    <!-- front bumper / lower lip at top -->
    <path d="M143 48 C170 39 250 39 277 48 L284 83 C243 75 177 75 136 83 Z"/>
    <!-- bonnet / nose shoulders -->
    <path d="M120 120 C134 98 153 86 181 82 L239 82 C267 86 286 98 300 120"/>
    <!-- main center body silhouette -->
    <path d="M135 123 C148 111 171 101 210 101 C249 101 272 111 285 123"/>
    <path d="M128 125 C132 176 139 226 154 285"/>
    <path d="M292 125 C288 176 281 226 266 285"/>
    <path d="M154 285 C170 301 250 301 266 285"/>
    <path d="M151 482 C169 463 251 463 269 482"/>
    <path d="M152 633 C172 646 248 646 268 633"/>
  </g>

  <!-- Glass details that were missing before -->
  <g id="glass-details" class="glass">
    <!-- front windscreen exactly emphasized -->
    <path id="front-windscreen" d="M158 105 C181 96 239 96 262 105 L273 137 C239 129 181 129 147 137 Z"/>
    <path d="M159 149 C180 144 240 144 261 149"/>
    <!-- front small glass/vents -->
    <path d="M132 151 C145 147 158 148 169 152 L166 171 C152 169 139 169 129 173 Z"/>
    <path d="M251 152 C262 148 275 147 288 151 L291 173 C281 169 268 169 254 171 Z"/>
    <!-- rear glass -->
    <path id="rear-window" d="M152 492 C174 480 246 480 268 492 L260 540 C235 532 185 532 160 540 Z"/>
    <path d="M155 554 C179 548 241 548 265 554"/>
    <!-- rear lamps -->
    <path d="M142 649 L177 653 L177 678 L132 672 Z"/>
    <path d="M243 653 L278 649 L288 672 L243 678 Z"/>
  </g>

  <!-- Main panels. IDs are descriptive; Codex can map these to existing panel ids. -->
  <g id="panels">
    <!-- bonnet -->
    <path id="panel-bonnet" class="panel" d="M151 151 C181 144 239 144 269 151 L289 275 C271 296 149 296 131 275 Z"/>
    <!-- roof/cabin -->
    <path id="panel-roof" class="panel" d="M154 304 C170 319 250 319 266 304 L269 472 C249 453 171 453 151 472 Z"/>
    <!-- boot lid -->
    <path id="panel-boot-lid" class="panel" d="M160 544 C185 532 235 532 260 544 L276 627 C250 641 170 641 144 627 Z"/>
    <!-- front bumper -->
    <path id="panel-front-bumper" class="panel" d="M143 48 C170 39 250 39 277 48 L284 83 C243 75 177 75 136 83 Z"/>
    <!-- rear bumper -->
    <path id="panel-rear-bumper" class="panel" d="M143 682 C174 691 246 691 277 682 L288 720 C249 734 171 734 132 720 Z"/>
    <!-- left front guard -->
    <path id="panel-left-front-guard" class="panel" d="M81 128 C100 108 121 101 135 119 C130 167 128 219 135 274 L112 310 C91 278 78 213 72 162 C70 147 72 137 81 128 Z"/>
    <!-- right front guard -->
    <path id="panel-right-front-guard" class="panel" d="M339 128 C320 108 299 101 285 119 C290 167 292 219 285 274 L308 310 C329 278 342 213 348 162 C350 147 348 137 339 128 Z"/>
    <!-- left front door -->
    <path id="panel-left-front-door" class="panel" d="M82 318 L136 300 C145 349 150 409 150 472 L102 500 C86 454 78 380 82 318 Z"/>
    <!-- right front door -->
    <path id="panel-right-front-door" class="panel" d="M338 318 L284 300 C275 349 270 409 270 472 L318 500 C334 454 342 380 338 318 Z"/>
    <!-- left rear door -->
    <path id="panel-left-rear-door" class="panel" d="M102 506 L150 481 C151 533 151 582 144 628 L105 648 C88 609 85 553 102 506 Z"/>
    <!-- right rear door -->
    <path id="panel-right-rear-door" class="panel" d="M318 506 L270 481 C269 533 269 582 276 628 L315 648 C332 609 335 553 318 506 Z"/>
    <!-- left rear quarter -->
    <path id="panel-left-rear-quarter" class="panel" d="M74 635 C82 605 91 582 105 570 L144 628 L132 720 C98 710 73 680 74 635 Z"/>
    <!-- right rear quarter -->
    <path id="panel-right-rear-quarter" class="panel" d="M346 635 C338 605 329 582 315 570 L276 628 L288 720 C322 710 347 680 346 635 Z"/>
  </g>

  <!-- Wheels / wheel arches. Four circular wheels placed like reference. -->
  <g id="wheels" class="outline">
    <circle cx="69" cy="197" r="34"/>
    <circle cx="69" cy="197" r="24" class="thin"/>
    <circle cx="351" cy="197" r="34"/>
    <circle cx="351" cy="197" r="24" class="thin"/>
    <circle cx="69" cy="579" r="34"/>
    <circle cx="69" cy="579" r="24" class="thin"/>
    <circle cx="351" cy="579" r="34"/>
    <circle cx="351" cy="579" r="24" class="thin"/>
  </g>

  <!-- Long side panels visible outside the doors, matching auction-sheet look -->
  <g id="outer-side-panels" class="outline">
    <path id="panel-left-side-outer" d="M55 255 L105 297 L105 553 L55 600 Z"/>
    <path id="panel-right-side-outer" d="M365 255 L315 297 L315 553 L365 600 Z"/>
  </g>

  <!-- Optional transparent hit areas. Use these if direct paths are too thin for clicking. -->
  <g id="hit-areas" opacity="0">
    <path id="hit-front-bumper" class="hit" d="M120 25 H300 V92 H120 Z"/>
    <path id="hit-bonnet" class="hit" d="M125 135 H295 V292 H125 Z"/>
    <path id="hit-roof" class="hit" d="M145 300 H275 V482 H145 Z"/>
    <path id="hit-boot-lid" class="hit" d="M135 500 H285 V640 H135 Z"/>
    <path id="hit-rear-bumper" class="hit" d="M120 650 H300 V735 H120 Z"/>
    <path id="hit-left-front-guard" class="hit" d="M55 110 H145 V315 H55 Z"/>
    <path id="hit-right-front-guard" class="hit" d="M275 110 H365 V315 H275 Z"/>
    <path id="hit-left-front-door" class="hit" d="M70 300 H160 V505 H70 Z"/>
    <path id="hit-right-front-door" class="hit" d="M260 300 H350 V505 H260 Z"/>
    <path id="hit-left-rear-door" class="hit" d="M75 490 H160 V650 H75 Z"/>
    <path id="hit-right-rear-door" class="hit" d="M260 490 H345 V650 H260 Z"/>
    <path id="hit-left-rear-quarter" class="hit" d="M45 560 H145 V735 H45 Z"/>
    <path id="hit-right-rear-quarter" class="hit" d="M275 560 H375 V735 H275 Z"/>
  </g>
</svg>
